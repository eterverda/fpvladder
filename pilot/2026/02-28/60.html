<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Ladder ⟫ FPV Ladder ⟫ Литвин Евгений</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
            --muted: #b2bec3;
            --line: #eee;
            --hover-bg: #fcfcfc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 0 80px 0;
        }

        .container { width: 100%; max-width: 600px; }

        .back-link {
            display: inline-block;
            margin: 0 0 30px 20px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        header { text-align: center; margin-bottom: 60px; padding: 0 20px; }
        h1 { font-weight: 400; font-size: 1.5rem; margin: 0 0 10px 0; }
        .big-rating { 
            font-size: 5rem; 
            font-weight: 700; 
            letter-spacing: -2px; 
            line-height: 1;
        }
        .subtle-rating { 
            font-size: 0.8rem; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-weight: 700; 
            padding-top: 20px;
        }

        h2 { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 40px 0 10px 50px; 
        }

        .data-table { width: 100%; border-collapse: collapse; }
        
         
        .event-group { cursor: pointer; border-bottom: 1px solid var(--line); transition: background 0.1s; }
        .event-group:hover { background-color: var(--hover-bg); }
        .event-group:last-child { border-bottom: none; }

        .event-row td { padding: 15px 8px 2px 8px; }
        .assignment-row td { padding: 0 8px 15px 8px; -webkit-tap-highlight-color: transparent; }

         
        .event-group a { text-decoration: none; color: inherit; }

        @media (hover: none) {
            .event-group:active { background-color: #f2f2f2; transition: background 0s; }
        }

        .col-spacer {
            text-align: right; width: 30px; font-size: 0.75rem; color: var(--muted);
            white-space: nowrap;
        } 

        .col-event { font-weight: 400; font-size: 1rem; }
        .col-date { text-align: right; width: 90px; color: var(--muted); font-size: 0.85rem; padding-right: 20px !important; }

        .assignment-container {
            text-align: right;
            margin-top: 4px;
            padding-right: 20px; 
        }

        .assignment-text { 
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 600;
        }

        .copyright {
            margin-top: 80px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../../index.html" class="back-link">← Назад к рейтингу</a>

        <header>
            <h1>FPV Ladder ⟫ Литвин Евгений</h1>
            <div class="subtle-rating">рейтинг</div>
            <div class="big-rating">1268</div>
        </header>

        <section>
            <h2>История соревнований</h2>
            <table class="data-table">
                
                <tbody class="event-group" data-href="../../../event/2026/02-28/6.html">
                    <tr class="event-row">
                        <td class="col-spacer">14/16</td>
                        <td class="col-event"><a href="../../../event/2026/02-28/6.html">Вупомания ⟫ S2T1 ⟫ Финалы</a></td>
                        <td class="col-date">2026-02-28</td>
                    </tr>
                    <tr class="assignment-row">
                        <td class="col-spacer"></td>
                        <td class="col-event">
                            <div class="assignment-container">
                                <span class="assignment-text">−44 → 1268</span>
                            </div>
                        </td>
                        <td class="col-date"></td>
                    </tr>
                </tbody>
                
                <tbody class="event-group" data-href="../../../event/2026/02-28/5.html">
                    <tr class="event-row">
                        <td class="col-spacer">15/42</td>
                        <td class="col-event"><a href="../../../event/2026/02-28/5.html">Вупомания ⟫ S2T1 ⟫ Квалификации</a></td>
                        <td class="col-date">2026-02-28</td>
                    </tr>
                    <tr class="assignment-row">
                        <td class="col-spacer"></td>
                        <td class="col-event">
                            <div class="assignment-container">
                                <span class="assignment-text">&#43;112 → 1312</span>
                            </div>
                        </td>
                        <td class="col-date"></td>
                    </tr>
                </tbody>
                
            </table>
        </section>

        <footer class="copyright">
            FPV Ladder Project &copy; 2026
        </footer>
    </div>

    <script>
        document.addEventListener('click', (e) => {
            const group = e.target.closest('.event-group[data-href]');
            if (group && !e.target.closest('a')) {
                window.location.href = group.dataset.href;
            }
        });
    </script>
</body>
</html>
