<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV Ladder ⟫ FPV Ladder ⟫ Жбанов Андрей</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
            --muted: #b2bec3;
            --line: #eee;
            --hover-bg: #fcfcfc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 20px 80px 20px;
        }

        .container { width: 100%; max-width: 600px; }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--text); }

        header { text-align: center; margin-bottom: 60px; }
        h1 { font-weight: 400; font-size: 1.5rem; margin: 0 0 40px 0; }
        .subtle-rating { 
            font-size: 0.8rem; 
            color: var(--muted); 
            text-transform: uppercase; 
            font-weight: 700; 
            line-height: 1;
        }
        .big-rating { 
            font-size: 5rem; 
            font-weight: 700; 
            letter-spacing: -2px; 
            line-height: 1;
        }

        h2 { 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: var(--muted); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 40px 0 10px 75px; 
        }

        .data-table { width: 100%; border-collapse: collapse; }
        
         
        .event-row td { padding: 20px 15px 4px 15px; }
        
         
        .assignment-row { border-bottom: 1px solid var(--line); }
        .assignment-row td { padding: 0 15px 20px 15px; }

        .col-spacer {
            text-align: right; width: 30px; font-size: 0.75rem; color: var(--muted);
            white-space: nowrap;
        } 

        .col-event { font-weight: 400; font-size: 1rem; }
        .col-date { text-align: right; width: 90px; }

         
        .assignment-container {
            text-align: right;
            margin-top: 8px;  
        }

        .assignment-text { 
            font-size: 1.2rem;  
            color: var(--text);  
            font-weight: 600;
        }

        .copyright {
            margin-top: 80px;
            text-align: center;
            font-size: 0.75rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../../index.html" class="back-link">← Назад к рейтингу</a>

        <header>
            <h1>FPV Ladder ⟫ Жбанов Андрей</h1>
            <div class="subtle-rating">рейтинг</div>
            <div class="big-rating">1230</div>
        </header>

        <section>
            <h2>История соревнований</h2>
            <table class="data-table">
                <tbody>
                    
                    <tr class="event-row">
                        <td class="col-spacer">13/16</td>
                        <td class="col-event">Гонка ГУАП 75 ЛЗ ⟫ Финалы</td>
                        <td class="col-date">2026-02-21</td>
                    </tr>
                    <tr class="assignment-row">
                        <td class="col-spacer"></td>
                        <td class="col-event">
                            <div class="assignment-container">
                                <span class="assignment-text">−52 → 1230</span>
                            </div>
                        </td>
                        <td class="col-date"></td>
                    </tr>
                    
                    <tr class="event-row">
                        <td class="col-spacer">13/33</td>
                        <td class="col-event">Гонка ГУАП 75 ЛЗ ⟫ Квалификации</td>
                        <td class="col-date">2026-02-21</td>
                    </tr>
                    <tr class="assignment-row">
                        <td class="col-spacer"></td>
                        <td class="col-event">
                            <div class="assignment-container">
                                <span class="assignment-text">&#43;82 → 1282</span>
                            </div>
                        </td>
                        <td class="col-date"></td>
                    </tr>
                    
                </tbody>
            </table>
        </section>

        <footer class="copyright">
            FPV Ladder Project &copy; 2026
        </footer>
    </div>
</body>
</html>
