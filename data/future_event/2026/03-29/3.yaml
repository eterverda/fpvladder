description: |
  ❗️Друзья, мы рады объявить об открытии регистрации на Первенство Ленинградской области по гонкам дронов!

  Возраст участников: 10-17 лет.

  🟣 29 марта 🟣
  Ленинградская область, Тосненский район, г. Любань, ул. Алексеенко, 24а (МБОУ «СОШ Любанский ЦО»)
  Дисциплины:
  - Класс 75 мм
  - Класс 75 мм - командные соревнования
  - Технический симулятор

  ✏️ Регистрация продлится до 26.03.25 23:59 ➔ <https://clck.ru/3SW7Ku>

  Основные технические требования:

  Общие:
  - Частота видеопередатчика: 5,8гГц (Аналог или HDZero)
  - Мощность видеопередатчика: 25мВт
  - Сетка R, возможность быстрой смены канала (не более 1 минуты)

  Класс 75 мм:
  - Диагональ рамы: 65-75мм
  - Аккумулятор: 1S до 550mAh
  - Защита пропеллеров обязательна

  📖 Положение и регламент ➔ <https://clck.ru/3SW9TF>

  📖 Согласия ➔ <https://clck.ru/3SWA3A>

  ‼️ Минимальное количество участников в дисциплине: 6 участников в личном зачёте, 4 команды в командном зачёте,
  при недоборе участников дисциплина не проводится.

  ❗ По итогам соревнований пройдет отбор в сборную Ленинградской области по гонкам дронов для дальнейшего участия в
  Первенстве Северо-Западного федерального округа.
