description: |
  ❗️Объявляем начало регистрации на Чемпионат Ленинградской области
  по гонкам дронов!

  Возраст участников: от 14 лет включительно.

  🟣 5 апреля 🟣

  Ленинградская область, Тосненский район, г. Любань, ул. Алексеенко, 24а
  (МБОУ «СОШ Любанский ЦО»)

  Дисциплины:
  - Класс 75 мм
  - Класс 75 мм - командные соревнования

  ✏️ Регистрация продлится до 02.04.25 23:59 ➔ <https://clck.ru/3SbimD>

  🟢 Основные технические требования:

  Общие:
  - Частота видеопередатчика: 5,8гГц (Аналог или HDZero)
  - Мощность видеопередатчика: 25мВт
  - Сетка R, возможность быстрой смены канала (не более 1 минуты)

  Класс 75 мм:
  - Диагональ рамы: 65-75мм
  - Аккумулятор: 1S до 550mAh
  - Защита пропеллеров обязательна

  📖 Положение и регламент ➔ <https://clck.ru/3Sbk6m>

  📖 Согласия для несовершеннолетних участников (до 18 лет) ➔
  <https://clck.ru/3Sbk4o>

  ⚡️Для проведения соревнований вводится организационный сбор 1000 рублей за
  каждый день соревнований (только с участников достигших 18 лет). Члены
  РСФОО "ФГДЛО" освобождаются от взноса.

  📖 Памятка по взносам: <https://clck.ru/3SfyUH>

  ❗️ По итогам соревнований пройдет отбор в сборную Ленинградской области
  по гонкам дронов для дальнейшего участия в Чемпионате Северо-Западного
  федерального округа и Кубке России.
