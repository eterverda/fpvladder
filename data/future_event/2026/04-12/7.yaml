description: |
  🚁 Соревнования по Гонкам дронов ко Дню космонавтики в Политехе Петра!

  Приглашаем всех желающих принять участие в соревнованиях по гонкам дронов (БВС), приуроченных к празднованию Дня космонавтики!

  Участников ждёт борьба в 200-м классе:
  - зачёт: личный.
  - квалификация: лучшее время 3-х кругов подряд
  - групповой этап: double elimination

  К участию допускаются все желающие от 14 лет без ограничений по принадлежности к образовательным организациям.

  📅 Дата и время: 12 апреля с 11:00

  📍 Место проведения: пр. Энгельса, д. 23, 4 этаж, спортивный зал

  🌍 Геолокация: <https:/yandex.ru/maps/-/CPRve2nD&utf=1>

  📝 Регистрация до 8 апреля: <https://vk.cc/cV7PKW>

  💬 Чат соревнований: <https://vk.cc/cV7PPQ>

  Соорганизатор - [Федерация гонок дронов Санкт-Петербурга](https://vk.com/club223217458)

  Главный судья - Елена Вольф

  Судья Хронометрист - Артем Шубин

  Гонки дронов - это скорость, точность и технологии. Проверь свои навыки и стань частью первого турнира Политеха Петра по пилотированию дронов! 🚀
