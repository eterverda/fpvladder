classes:
  - drone-racing > 75mm
description: |
  Приглашаем всех желающих на гонку дронов ГУАП 23 мая!

  Где: Точка кипения – ГУАП, Санкт-Петербург, залы TERRA, Эскадрон, ЛИАП

  Адрес: ул. Труда, д. 8

  Основные требования к участникам:
    - Возраст: от 10 лет
    - Размер рамы: до 75 мм
    - Видеопередатчик: аналог или HDZero
    - Мощность передатчика: 25 мВт (сетка R)

  Расписание:

  10:00 – Регистрация участников

  11:00 – Старт гонок

  Участие бесплатное! Для участия необходима ОБЯЗАТЕЛЬНАЯ регистрация на
  платформе Leader-ID <https://leader-id.ru/events/603251> И в Яндекс форме:
  <https://forms.yandex.ru/u/69df6dcfd04688f1ca936257>

  Регламент соревнований будет отправлен на вашу почту.

  Также в данной гонке будем проводить командную гонку, в той же форме
  заполните ФИО участников и название команды.
